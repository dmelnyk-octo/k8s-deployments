kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
containerdConfigPatches: # allow http requests to local registry
- |-
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."host.docker.internal:5000"]
    endpoint = ["http://host.docker.internal:5000"]
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."host.docker.internal:5001"]
    endpoint = ["http://host.docker.internal:5001"]
