apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-controller
  namespace: argocd
  annotations:
    argo.octopus.com/project: mock-controller
    argo.octopus.com/environment: development
spec:
  project: default
  source:
    repoURL: https://github.com/dmelnyk-octo/k8s-deployments.git
    targetRevision: HEAD
    path: mock-controller-app/chart
    helm:
      releaseName: mock-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: mock-controller
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
